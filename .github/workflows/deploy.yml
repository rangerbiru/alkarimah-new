name: Deploy Laravel to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 Memulai deployment..."

            # Masuk ke folder project
            cd /var/www/html/app

            # Tarik kode terbaru dari GitHub
            git pull origin main

            # Install dependensi PHP (tanpa dev)
            composer install --optimize-autoloader --no-dev

            # Jalankan migrasi database (force untuk production)
            php artisan migrate --force

            # Clear dan build cache Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Perbaiki izin folder agar tidak error permission
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "✅ Deployment berhasil!"
